<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola Captive Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-[#301043] via-[#1a0826] to-black text-white">
    <main class="min-h-screen flex items-center justify-center p-4">
        <section class="w-full max-w-md bg-white text-gray-800 rounded-3xl shadow-2xl border-t-8 border-orange-500 p-6">
            <div class="text-center mb-6">
                <div class="w-16 h-16 mx-auto rounded-full bg-orange-100 text-orange-600 flex items-center justify-center text-3xl mb-3">
                    <i class="fa-solid fa-wifi"></i>
                </div>
                <h1 class="text-2xl font-black text-[#301043]">تفعيل الإنترنت</h1>
                <p class="text-sm text-gray-500 mt-1">أدخل كود التفعيل ورقم الهاتف للاتصال بالإنترنت</p>
            </div>

            <form id="portalForm" class="space-y-4">
                <div>
                    <label for="code" class="block text-xs font-bold mb-1 text-gray-600">كود التفعيل</label>
                    <input id="code" type="text" required
                        class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-center font-mono font-black uppercase tracking-widest focus:outline-none focus:border-orange-500"
                        placeholder="HOLA-XXXX-XXXX" oninput="this.value=this.value.toUpperCase()">
                </div>
                <div>
                    <label for="phone" class="block text-xs font-bold mb-1 text-gray-600">رقم الهاتف</label>
                    <input id="phone" type="tel" required dir="ltr"
                        class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-left font-mono font-bold tracking-wide focus:outline-none focus:border-orange-500"
                        placeholder="01XXXXXXXXX">
                </div>
                <button id="submitBtn" type="submit"
                    class="w-full bg-[#301043] hover:bg-[#1a0826] text-white font-black py-3.5 rounded-xl transition">
                    <i class="fa-solid fa-right-to-bracket ml-1"></i> تسجيل الدخول
                </button>
            </form>

            <div id="msg" class="hidden mt-4 text-sm rounded-lg px-3 py-2 font-bold"></div>
        </section>
    </main>

    <script>
        function showMsg(text, type) {
            const el = document.getElementById('msg');
            if (!el) return;
            el.className = 'mt-4 text-sm rounded-lg px-3 py-2 font-bold';
            if (type === 'error') el.classList.add('bg-red-100', 'text-red-700');
            else if (type === 'success') el.classList.add('bg-green-100', 'text-green-700');
            else el.classList.add('bg-blue-100', 'text-blue-700');
            el.textContent = text;
            el.classList.remove('hidden');
        }

        function getDeviceId() {
            let id = localStorage.getItem('hola_device_id');
            if (!id) {
                const arr = new Uint8Array(8);
                crypto.getRandomValues(arr);
                id = 'dev_' + Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
                localStorage.setItem('hola_device_id', id);
            }
            return id;
        }

        document.getElementById('portalForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('code')?.value.trim().toUpperCase();
            const phone = document.getElementById('phone')?.value.trim();
            if (!code) return showMsg('أدخل كود التفعيل', 'error');
            if (!phone || phone.length < 10) return showMsg('أدخل رقم هاتف صحيح', 'error');

            const btn = document.getElementById('submitBtn');
            if (btn) { btn.disabled = true; btn.textContent = 'جاري التحقق...'; }

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code,
                        phone,
                        deviceId: getDeviceId(),
                        deviceInfo: navigator.userAgent.slice(0, 120)
                    })
                });
                const data = await res.json();
                if (!res.ok || !data.ok) {
                    showMsg(data.error || 'تعذر تسجيل الدخول', 'error');
                    return;
                }

                localStorage.setItem('hola_my_card', code);
                localStorage.setItem('hola_portal_phone', phone);
                localStorage.setItem('hola_portal_autologin', '1');
                showMsg('تم تفعيل الإنترنت بنجاح! جاري تحويلك...', 'success');
                const next = data.dashboardUrl || `/app/index.html?portal=1&phone=${encodeURIComponent(phone)}&code=${encodeURIComponent(code)}`;
                setTimeout(() => { window.location.href = next; }, 700);
            } catch (_err) {
                showMsg('حدث خطأ في الاتصال بالخادم', 'error');
            } finally {
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket ml-1"></i> تسجيل الدخول'; }
            }
        });
    </script>
</body>
</html>
