<!--
=======================================================================
  WCAG ACCESSIBILITY FIXES — index.html PATCH GUIDE
  Apply each change to the corresponding line in your index.html
=======================================================================

AUDIT ISSUES FIXED:
  ✅ #4  — iframe missing title (dynamic; fixed via sanitizeEmbedForA11y in ui.js)
  ✅ #8  — <span> used for strong/emphasis → changed to <strong>
  ✅ #10 — <body> exposed to AT → fixed by adding proper footer landmark  
  ✅ #31 — <nav> misused (contains buttons, not links) → div[role=navigation]
  ✅ #37 — Decorative image missing alt/aria-hidden → fixed in ui.js
  ✅ #38 — Images missing alt text → fixed in markup + ui.js
  ✅ #43 — Sticky header overlaps focused elements → scroll-padding-top + a11y.css
  ✅ #50 — Tab container missing role="tablist" → added in client & admin tab rows
  ✅ #52 — Tab buttons missing role="tab" + aria-selected → added + toggled in JS
  ✅ BONUS — Skip-to-main link added for keyboard navigation
  ✅ BONUS — Footer landmark added (WCAG best practice #9)
  ✅ BONUS — aria-label on all icon-only action buttons
  ✅ BONUS — prefers-reduced-motion support in a11y.css
  ✅ BONUS — focus-visible ring in a11y.css for keyboard users

=======================================================================
  CHANGES TO APPLY — Copy-paste replacements for index.html
=======================================================================
-->

<!-- ════════════════════════════════════════════════════════════════
  CHANGE 1: Add scroll-padding-top to <html> (FIX #43)
════════════════════════════════════════════════════════════════ -->

<!-- BEFORE: -->
<html lang="ar" dir="rtl">

<!-- AFTER: -->
<html lang="ar" dir="rtl" style="scroll-padding-top:72px;">


<!-- ════════════════════════════════════════════════════════════════
  CHANGE 2: Add <link> for a11y.css in <head> (NEW)
════════════════════════════════════════════════════════════════ -->

<!-- Add this line inside <head>, after the other CSS links: -->
<link rel="stylesheet" href="css/a11y.css">


<!-- ════════════════════════════════════════════════════════════════
  CHANGE 3: Add skip-to-main link after <body> opening tag (BONUS)
════════════════════════════════════════════════════════════════ -->

<!-- BEFORE: -->
<body class="text-gray-800 antialiased min-h-screen flex flex-col relative">

    <!-- Sound Alerts -->

<!-- AFTER: -->
<body class="text-gray-800 antialiased min-h-screen flex flex-col relative">

    <!-- Skip to main content link for keyboard/screen reader users -->
    <a href="#main-content"
       class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:right-2 focus:z-[9999] focus:bg-white focus:text-gray-900 focus:px-4 focus:py-2 focus:rounded-lg focus:font-bold focus:shadow-xl focus:border-2 focus:border-gray-900">
        انتقل إلى المحتوى الرئيسي
    </a>

    <!-- Sound Alerts -->


<!-- ════════════════════════════════════════════════════════════════
  CHANGE 4: Add id + role to msgBox toast for live regions (FIX #10)
════════════════════════════════════════════════════════════════ -->

<!-- BEFORE: -->
<div id="msgBox" class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-4 rounded-xl shadow-2xl z-[300] flex items-center gap-3 print:hidden">

<!-- AFTER: -->
<div id="msgBox" role="status" aria-live="polite" aria-atomic="true" class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-4 rounded-xl shadow-2xl z-[300] flex items-center gap-3 print:hidden">


<!-- ════════════════════════════════════════════════════════════════
  CHANGE 5: Add id + scroll-margin to <main> (FIX #43 + skip link)
════════════════════════════════════════════════════════════════ -->

<!-- BEFORE: -->
<main class="flex-grow container mx-auto px-4 py-8 no-print">

<!-- AFTER: -->
<main id="main-content" class="flex-grow container mx-auto px-4 py-8 no-print" style="scroll-margin-top:72px;">


<!-- ════════════════════════════════════════════════════════════════
  CHANGE 6: Fix <nav> misuse (FIX #31)
  <nav> should only wrap navigation links, not action buttons
════════════════════════════════════════════════════════════════ -->

<!-- BEFORE: -->
<nav class="flex gap-4 items-center">
    <button id="navPublic" ...
    ...
</nav>

<!-- AFTER: -->
<div role="navigation" aria-label="القائمة الرئيسية" class="flex gap-4 items-center">
    <button id="navPublic" ...
    ...
</div>

<!-- ════════════════════════════════════════════════════════════════
  CHANGE 19: Add aria-hidden="true" to all decorative FontAwesome icons
  that are already next to visible text labels (FIX #37)
  Examples (apply globally throughout index.html):
════════════════════════════════════════════════════════════════ -->

<!-- Pattern: any <i class="fa-solid ..."></i> next to text → add aria-hidden="true" -->
<!-- BEFORE: -->
<i class="fa-solid fa-lock text-xs ml-1"></i> الإدارة
<!-- AFTER: -->
<i class="fa-solid fa-lock text-xs ml-1" aria-hidden="true"></i> الإدارة

<!-- Apply this pattern to ALL icon elements throughout the file.
     The ui.js render functions already include aria-hidden="true"
     on all dynamically generated icons. -->


<!-- ════════════════════════════════════════════════════════════════
  CHANGE 20: iframe embed in admin settings — add title reminder
════════════════════════════════════════════════════════════════ -->

<!-- BEFORE placeholder: -->
placeholder="<iframe src=... />"

<!-- AFTER placeholder: -->
placeholder="<iframe title='وصف المحتوى' src=... />"

<!-- NOTE: sanitizeEmbedForA11y() in ui.js automatically adds title
     to any iframe that is missing one when rendered dynamically. -->
